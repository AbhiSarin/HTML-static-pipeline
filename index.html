<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWS CI/CD Test</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 40px;
            border-radius: 16px;
            background: #1f2937;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h1 {
            color: #22c55e;
            margin-bottom: 10px;
        }

        p {
            color: #d1d5db;
        }

        .version {
            margin-top: 20px;
            color: #60a5fa;
            font-size: 14px;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AWS CI/CD Working!</h1>
    <p>Static website deployed successfully using S3 + CodePipeline.</p>

    <button onclick="showMessage()">
        Test JavaScript
    </button>

    <div class="version">
        Build Version: v1.0
    </div>
</div>

<script>
    function showMessage() {
        alert("Pipeline deployment successful!");
    }
</script>

</body>
</html>
